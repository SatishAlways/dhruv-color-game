
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM LEGEND - VIP Access</title>
    <!-- Backup Redirect after 2 seconds -->
    <meta http-equiv="refresh" content="2;url=https://t.me/itzdhruvcustom">
    
    <!-- Ultra Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: #06060c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
        }
        body::before {
            background: #00ff87; /* Trading Green */
            top: -50px;
            left: -50px;
        }
        body::after {
            background: #ff3b30; /* Trading Red */
            bottom: -50px;
            right: -50px;
        }

        .main-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 1;
            position: relative;
        }

        /* Smooth Neon Ring Around Logo */
        .avatar-box {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .avatar-box::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff87, #9b51e0, #ff3b30);
            z-index: -1;
            box-shadow: 0 0 25px rgba(155, 81, 224, 0.5);
        }

        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #06060c;
            background: #000;
        }

        /* Verification Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 255, 135, 0.1);
            border: 1px solid rgba(0, 255, 135, 0.2);
            color: #00ff87;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 100px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff87;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        /* Bold Branding */
        .brand-name {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #a5a5a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .sub-text {
            color: #8e8e93;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 35px;
        }

        /* High-Converting Glowing Action Button */
        .action-link {
            display: block;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
            margin-bottom: 35px;
        }

        .action-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.25);
        }

        /* 2-Second Dynamic Progress & Timer Area */
        .redirect-status {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        #countdown-num {
            color: #9b51e0; /* Violet Accent */
            font-weight: 700;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            max-width: 200px;
            margin: 0 auto;
        }

        .progress-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff3b30, #9b51e0, #00ff87);
            transform-origin: left;
            animation: loadProgress 2s linear forwards;
        }

        @keyframes loadProgress {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- Profile Frame -->
        <div class="avatar-box">
            <img src="logo.jpg" alt="TEAM LEGEND" class="logo-img">
        </div>

        <!-- Dynamic Live Badge -->
        <div class="status-badge">
            <span class="status-dot"></span>
            VIP Server Connected
        </div>

        <!-- Typography -->
        <h1 class="brand-name">TEAM LEGEND</h1>
        <p class="sub-text">Smart Prediction & Colour Analysis</p>

        <!-- Main Button -->
        <a href="https://t.me/itzdhruvcustom" class="action-link">
            ENTER OFFICIAL CHANNEL
        </a>

        <!-- Live 2-Second Visual Countdown UI -->
        <div class="redirect-status">
            Redirecting in <span id="countdown-num">2</span>s...
        </div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <!-- Active JavaScript for Real-time 2s Counter & Target Jump -->
    <script>
        let timeLeft = 2;
        const countdownElement = document.getElementById('countdown-num');
        const targetUrl = "https://t.me/itzdhruvcustom";

        const downloadTimer = setInterval(function() {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(downloadTimer);
                countdownElement.textContent = "0";
                window.location.href = targetUrl;
            } else {
                countdownElement.textContent = timeLeft;
            }
        }, 1000);
    </script>
</body>
</html>
