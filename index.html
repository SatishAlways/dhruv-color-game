        .history-wrap::-webkit-scrollbar { width: 5px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; font-weight: 500; }
        th {

        .win { color: #00ffaa; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,170,0.3); }
        .loss { color: #ff003c; font-weight: bold; text-shadow: 0 0 10px rgba(255,0,60,0.3); }

        .auto-status {
            font-size: 12px;

            padding: 12px;
            background: rgba(0, 212, 255, 0.03);

            border: 1px solid rgba(0, 212, 255, 0.15);

        button {
            background: linear-gradient(45deg, #ff003c, #9900ff, #00d4ff);
            background-size: 200% auto;
            border: none;
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;

            cursor: pointer;

            margin-top: 15px;

            transition: transform 0.2s;

        button:active { transform: scale(0.97); }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
        }
        .stat-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);

        .stat-number { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; margin-top: 5px; }
        .win-stat { color: #00ffaa; text-shadow: 0 0 15px rgba(0,255,170,0.2); }

        .trademark {

        .trademark a {
            color: #00d4ff;

            text-shadow: 0 0 10px rgba(0,212,255,0.4);
        }

        @keyframes floatCard { 0%, 100% { transform: translate3d(0,0,0); } 50% { transform: translate3d(0,-6px,0); } }
        @keyframes sweepLine { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes textShine { to { background-position: 200% center; } }
        @keyframes btnShine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 8px rgba(255,0,60,0.3); } 100% { box-shadow: 0 0 20px rgba(255,0,60,0.7); } }
        @keyframes textGlowRed { 0% { text-shadow: 0 0 15px rgba(255,0,60,0.4); } 100% { text-shadow: 0 0 30px rgba(255,0,60,0.9); } }
        @keyframes textGlowCyan { 0% { text-shadow: 0 0 15px rgba(0,212,255,0.4); } 100% { text-shadow: 0 0 30px rgba(0,212,255,0.9); } }
        @keyframes floatDiamond { 0% { transform: rotate(45deg) translate3d(0,0,0); } 100% { transform: rotate(45deg) translate3d(-5px,-5px,0); } }

<body>

<div class="app-frame">

            <div id="pID" style="color:#888;font-size:13px;margin-bottom:15px;font-weight: 700;letter-spacing: 1px;">CONNECTING TO CORE DATA NETWORK...</div>

            <div style="font-family: 'Orbitron', sans-serif; font-size:11px; color:#ffea00; margin-bottom:15px; margin-top:25px; font-weight:900; letter-spacing:2px; display:flex; align-items:center; justify-content:center; gap:8px;">

<script>
(function(){
    document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
    document.addEventListener('keydown',function(e){
        if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i'))||(e.ctrlKey&&(e.key==='u'||e.key==='U'))){e.preventDefault();return false;}
    });
    
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    document.addEventListener('click', initAudio, { once: true });
    document.addEventListener('touchstart', initAudio, { once: true });

    function playSound(type) {
        try {
            if (!audioCtx) return; 
            if (audioCtx.state === 'suspended') audioCtx.resume();

            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            let now = audioCtx.currentTime;

            if (type === 'win') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, now); 
                osc.frequency.setValueAtTime(880.00, now + 0.08); 
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } 
            else if (type === 'jackpot') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now); 
                osc.frequency.setValueAtTime(659.25, now + 0.06); 
                osc.frequency.setValueAtTime(783.99, now + 0.12); 
                osc.frequency.setValueAtTime(1046.50, now + 0.18); 
                gain.gain.setValueAtTime(0.18, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            } 
            else if (type === 'loss') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, now);
                osc.frequency.exponentialRampToValueAtTime(55, now + 0.3);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
        } catch (e) {
            console.log("Audio Error:", e);
        }
    }

    const API="https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
    let allRes=[],rounds=[],lastPred="BIG",lastNums=[6,8],lastPer=null,wC=0,lC=0,loaded=false;
    
    function getT(n){return parseInt(n)>=5?"BIG":"SMALL";}
    
    // RECTIFIED REAL-TIME TREND MATRIX
    function getPred(){
        if(allRes.length < 3) return "BIG"; // Scaled down fallback guard to avoid hardcoded loop
        
        let hist = allRes.map(r => getT(r.number));
        let lastNum = parseInt(allRes[0].number);
        let currentType = hist[0];
        
        // 1. Instant Dragon Line & Trend Ride Logic
        let streak = 1;
        for (let i = 1; i < hist.length; i++) {
            if (hist[i] === currentType) streak++;
            else break;
        }
        if (streak >= 2 && streak < 9) {
            return currentType; // Dynamically locking trend line (Follows SSS or BBB instantly)
        }
        
        // 2. Chop-Chop Checker
        if (hist.length >= 4 && hist[0] !== hist[1] && hist[1] === hist[2] && hist[2] !== hist[3]) {
            return currentType === "BIG" ? "SMALL" : "BIG";
        }
        
        // 3. Density Adjuster
        let sampleSize = Math.min(hist.length, 6);
        let bigCount = hist.slice(0, sampleSize).filter(t => t === "BIG").length;
        if (bigCount > sampleSize / 2) return "SMALL";
        if (bigCount < sampleSize / 2) return "BIG";
        
        return lastNum % 2 === 0 ? "BIG" : "SMALL";
    }

    function getSugg(p){
        let pool = p === "BIG" ? [5,6,7,8,9] : [0,1,2,3,4];
        if(allRes.length < 3) return p === "BIG" ? [6,8] : [1,3];
        
        let recentNums = allRes.map(r => parseInt(r.number));
        let weights = {};
        
        pool.forEach(n => {
            weights[n] = 0;
            recentNums.forEach((r, idx) => {
                if(r === n) weights[n] += (recentNums.length - idx); 
            });
        });
        
        let sorted = pool.sort((a,b) => weights[b] - weights[a]);
        return [Math.min(sorted[0], sorted[1]), Math.max(sorted[0], sorted[1])];
    }

    function updUI(){
        if(allRes.length<1){
            document.getElementById('pRes').innerHTML="---";
            return;
        }
        let pred = getPred();
        lastPred = pred;
        
        let pe = document.getElementById('pRes');
        pe.innerHTML = pred;
        pe.className = pred === "BIG" ? "pred-val val-big" : "pred-val val-small";
        
        let sug = getSugg(pred);
        lastNums = sug;
        
        document.getElementById('nRow').innerHTML=`
            <div class="num-circle"><span>${sug[0]}</span></div>
            <div class="num-circle" style="animation-delay: 0.3s;"><span>${sug[1]}</span></div>
        `;
    }
    
    function updStats(){
        document.getElementById('wC').innerHTML=wC;
        document.getElementById('lC').innerHTML=lC;
        let t = wC+lC;
        let wr = t>0 ? Math.round((wC/t)*100) : 0;
        document.getElementById('wR').innerHTML = wr+"%";
    }
    
    function updHist(){
        let tb = document.getElementById('hBody');
        if(rounds.length===0){tb.innerHTML='<tr><td colspan="4">Awaiting server data...</td></tr>';return;}
        let h='';
        for(let i=rounds.length-1;i>=0;i--){
            let r=rounds[i], cls=r.isWin?'win':'loss', txt=r.isWin?'WIN':'LOSS';
            if(r.isJackpot){cls='jackpot';txt='JACKPOT';}
            else if(r.isNumWin&&!r.isTypeWin){cls='win';txt='WIN (NUM)';}
            h+=`<tr><td style="color:#888;">${r.period.slice(-6)}</td><td><strong>${r.predicted}</strong> <span style="font-size:9px;color:#666;">[${r.predNum}]</span></td><td>${r.number} <span style="font-size:9px;color:#666;">(${r.type})</span></td><td class="${cls}">${txt}</td></tr>`;
        }
        tb.innerHTML=h;
        updStats();
    }
    
    function procRes(per,num){
        if(rounds.some(r=>r.period===per))return;
        let actT=getT(num), isWin=false, isJack=false, isNumWin=false, isTypeWin=false, pred="N/A", pNum="N/A";
        if(rounds.length>0||allRes.length>0){
            pred=lastPred; pNum=lastNums.join(',');
            let numMatch = lastNums.includes(parseInt(num));
            let typeMatch = (pred===actT);
            
            isNumWin = numMatch; 
            isTypeWin = typeMatch;
            
            let stsBox = document.getElementById('aSts');
            
            if(typeMatch&&numMatch){
                isJack=true;isWin=true;wC++; 
                stsBox.innerHTML=`⚡ JACKPOT HIT! [${num}]`; 
                stsBox.style.color="#ffea00"; stsBox.style.borderColor="rgba(255,234,0,0.4)";
                playSound('jackpot');
            }
            else if(typeMatch){
                isWin=true;wC++; 
                stsBox.innerHTML=`✅ PREDICTION SECURED [${actT}]`; 
                stsBox.style.color="#00ffaa"; stsBox.style.borderColor="rgba(0,255,170,0.3)";
                playSound('win');
            }
            else if(numMatch){
                isWin=true;wC++; 
                stsBox.innerHTML=`✅ NUMBER SECURED [${num}]`; 
                stsBox.style.color="#00ffaa"; stsBox.style.borderColor="rgba(0,255,170,0.3)";
                playSound('win');
            }
            else{
                isWin=false;lC++; 
                stsBox.innerHTML=`❌ TARGET MISSED [${actT}]`; 
                stsBox.style.color="#ff003c"; stsBox.style.borderColor="rgba(255,0,60,0.3)";
                playSound('loss');
            }
            
            rounds.push({period:per, number:parseInt(num), type:actT, predicted:pred, predNum:pNum, isWin:isWin, isJackpot:isJack, isNumWin:isNumWin, isTypeWin:isTypeWin});
        }else{
            document.getElementById('aSts').innerHTML=`📡 Analyzing initial block... Standby.`;
        }
        updHist();
    }
    
    async function loadData(){
        try{
            let r=await fetch(API+"?t="+Date.now()), d=await r.json();
            if(d?.data?.list?.length){
                allRes = d.data.list;
                let lat = allRes[0];
                document.getElementById('pID').innerHTML="NODE ID: " + lat.issueNumber.slice(-8) + " // LAST: " + lat.number;
                updUI();
                lastPer = lat.issueNumber;
                loaded = true;
            }
        }catch(e){
            document.getElementById('aSts').innerHTML="⚠️ Server Lag, Reconnecting...";
            setTimeout(loadData,3000);
        }
    }
    
    async function checkNew(){
        if(!loaded)return;
        try{
            let r=await fetch(API+"?t="+Date.now()), d=await r.json();
            if(d?.data?.list?.length){
                let lat=d.data.list[0], per=lat.issueNumber, num=parseInt(lat.number);
                if(lastPer!==per){
                    procRes(per,num);
                    lastPer=per;
                    allRes=d.data.list;
                    updUI();
                }
            }
        }catch(e){}
    }
    
    function startTimer(){
        setInterval(()=>{
            let rem = 60 - new Date().getSeconds();
            let t = document.getElementById('tmr');
            t.innerText = `00:${rem<10?'0'+rem:rem}`;
            if(rem <= 5) {
                t.className = "timer-display timer-warning";
            } else {
                t.className = "timer-display";
            }
        }, 1000);
    }
    
    window.resetAll=function(){
        if(confirm("⚠ WARNING: Reset terminal statistics?")){
            rounds=[]; wC=0; lC=0; updHist(); loadData();
            let aSts = document.getElementById('aSts');
            aSts.innerHTML="🔄 Logs Purged. Rebooting...";
            aSts.style.color="#00d4ff";
            aSts.style.borderColor="rgba(0,212,255,0.2)";
        }
    };
    
    startTimer();
    loadData();
    setInterval(checkNew, 3000);
})();
</script>
</body>
